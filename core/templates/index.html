<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Humanizer & Style Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --surface: #111827;
            --surface2: #1a2236;
            --border: #1f2937;
            --border-hover: #374151;
            --text: #f3f4f6;
            --text2: #9ca3af;
            --text3: #6b7280;
            --accent: #6366f1;
            --accent2: #a855f7;
            --grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --green: #10b981;
            --red: #ef4444;
            --font: 'Plus Jakarta Sans', sans-serif;
            --font2: 'Space Grotesk', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }
        body::before, body::after {
            content: "";
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
            top: -150px; left: -150px;
        }
        body::after {
            background: radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 70%);
            bottom: -150px; right: -150px;
        }
        .app { position: relative; z-index: 1; width: 100%; max-width: 900px; }

        /* TYPEWRITER */
        .typewriter-wrap {
            text-align: center;
            margin-bottom: 2rem;
            min-height: 3rem;
        }
        .typewriter-text {
            font-family: var(--font2);
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 3px;
            height: 1.8rem;
            background: var(--accent);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.7s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* INPUT CARD */
        .input-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 50px rgba(99,102,241,0.08);
        }
        .input-area {
            width: 100%;
            min-height: 120px;
            max-height: 350px;
            padding: 1rem 1.25rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-family: var(--font);
            font-size: 1rem;
            line-height: 1.65;
            resize: none;
            outline: none;
            overflow-y: auto;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-area:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(99,102,241,0.15);
        }
        .input-area:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .input-area::placeholder { color: var(--text3); }

        /* ACTION BAR */
        .action-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
            padding: 0.5rem 0.25rem;
        }
        .word-badge {
            font-size: 0.75rem;
            color: var(--text3);
            margin-left: auto;
            white-space: nowrap;
        }
        .mode-tag {
            display: none;
            align-items: center;
            gap: 0.35rem;
            background: rgba(99,102,241,0.12);
            color: var(--accent);
            border: 1px solid rgba(99,102,241,0.25);
            border-radius: 20px;
            padding: 0.3rem 0.75rem;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .mode-tag.visible { display: inline-flex; }
        .mode-tag .x {
            font-size: 0.9rem;
            opacity: 0.6;
            transition: opacity 0.15s;
        }
        .mode-tag:hover .x { opacity: 1; }
        .submit-btn {
            width: 44px; height: 44px;
            min-width: 44px;
            border-radius: 50%;
            border: none;
            background: var(--grad);
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(99,102,241,0.3);
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
        }
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(99,102,241,0.4);
        }
        .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .submit-btn svg { width: 20px; height: 20px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

        /* MODE PILLS */
        .mode-pills {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .pill {
            padding: 0.5rem 1.1rem;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            font-family: var(--font);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .pill:hover { border-color: var(--accent); color: var(--text); }
        .pill.active {
            background: rgba(99,102,241,0.15);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        /* RESULTS SECTION */
        .results {
            display: none;
            margin-top: 1.5rem;
            gap: 1rem;
            animation: slideUp 0.4s ease-out;
        }
        .results.show { display: grid; grid-template-columns: 1fr 1fr; }
        @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem 1.25rem;
            display: flex;
            flex-direction: column;
            min-height: 200px;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .panel-title {
            font-family: var(--font2);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text2);
        }
        .panel-actions { display: flex; gap: 0.4rem; align-items: center; }
        .icon-btn {
            width: 30px; height: 30px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border-hover); }
        .icon-btn.active { background: rgba(99,102,241,0.12); color: var(--accent); border-color: var(--accent); }
        .panel-body {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.7;
            overflow-y: auto;
            max-height: 400px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .eval-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.25rem 0.6rem;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .eval-tag.human { background: rgba(16,185,129,0.12); color: var(--green); }
        .eval-tag.ai { background: rgba(239,68,68,0.12); color: var(--red); }

        /* DIFF HIGHLIGHTS */
        .diff-del { background: rgba(239,68,68,0.18); border-radius: 3px; padding: 0 2px; }
        .diff-add { background: rgba(16,185,129,0.18); border-radius: 3px; padding: 0 2px; }

        /* LOADING OVERLAY */
        .loading-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(11,15,25,0.85);
            backdrop-filter: blur(6px);
            border-radius: 16px;
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
        }
        .loading-overlay.show { display: flex; }
        .spinner-ring {
            width: 52px; height: 52px;
            border: 3px solid rgba(99,102,241,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-family: var(--font2);
            font-size: 1rem;
            font-weight: 600;
            color: var(--text2);
            min-width: 120px;
            text-align: center;
        }

        /* SKELETON */
        .skeleton-line {
            height: 14px;
            border-radius: 7px;
            background: linear-gradient(90deg, var(--surface2) 25%, rgba(99,102,241,0.08) 50%, var(--surface2) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            margin-bottom: 0.6rem;
        }
        .skeleton-line:nth-child(2) { width: 85%; }
        .skeleton-line:nth-child(3) { width: 92%; }
        .skeleton-line:nth-child(4) { width: 70%; }
        .skeleton-line:nth-child(5) { width: 78%; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* ERROR STATE */
        .error-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 2rem;
            text-align: center;
        }
        .error-state.show { display: flex; }
        .retry-btn {
            padding: 0.6rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
        }
        .retry-btn:hover { border-color: var(--accent); background: rgba(99,102,241,0.1); }

        /* RESPONSIVE */
        @media (max-width: 700px) {
            .results.show { grid-template-columns: 1fr; }
            .typewriter-text { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Typewriter Heading -->
    <div class="typewriter-wrap">
        <span class="typewriter-text" id="typewriterText"></span><span class="typewriter-cursor"></span>
    </div>

    <!-- Input Card -->
    <div class="input-card" id="inputCard">
        <textarea class="input-area" id="inputText" placeholder="Paste your text here (minimum 20 words)..." oninput="autoGrow(this); updateWords()"></textarea>
        <div class="action-bar">
            <span class="word-badge" id="wordBadge">0 words</span>
            <span class="mode-tag" id="modeTag" onclick="clearMode()">
                <span id="modeTagLabel">Humanizer</span>
                <span class="x">&times;</span>
            </span>
            <button class="submit-btn" id="submitBtn" onclick="submitText()" title="Transform">
                <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            </button>
        </div>
        <!-- Mode Pills -->
        <div class="mode-pills" id="modePills">
            <button class="pill active" data-mode="HUMANIZER" onclick="selectMode(this)">&#x270D; Humanizer</button>
            <button class="pill" data-mode="PROFESSIONAL" onclick="selectMode(this)">&#x1F4BC; Professional</button>
            <button class="pill" data-mode="CREATIVE" onclick="selectMode(this)">&#x2728; Creative</button>
            <button class="pill" data-mode="ACADEMIC" onclick="selectMode(this)">&#x1F393; Academic</button>
            <button class="pill" data-mode="CLEAR" onclick="selectMode(this)">&#x1F4A1; Clear</button>
        </div>
    </div>

    <!-- Results: Input Panel (left) + Output Panel (right) -->
    <div class="results" id="results" style="position:relative;">
        <!-- Input Panel -->
        <div class="panel" id="inputPanel">
            <div class="panel-header">
                <span class="panel-title">Input</span>
                <div class="panel-actions">
                    <button class="icon-btn" onclick="copyText('inputBody')" title="Copy input">&#x1F4CB;</button>
                </div>
            </div>
            <div class="panel-body" id="inputBody"></div>
        </div>
        <!-- Output Panel -->
        <div class="panel" id="outputPanel">
            <div class="panel-header">
                <span class="panel-title">Output</span>
                <div class="panel-actions">
                    <span class="eval-tag" id="evalTag" style="display:none;"></span>
                    <button class="icon-btn" id="diffToggle" onclick="toggleDiff()" title="Toggle diff highlights">&#x1F50D;</button>
                    <button class="icon-btn" onclick="copyText('outputBody')" title="Copy output">&#x1F4CB;</button>
                </div>
            </div>
            <div class="panel-body" id="outputBody">
                <div class="skeleton-line" style="width:100%"></div>
                <div class="skeleton-line"></div>
                <div class="skeleton-line"></div>
                <div class="skeleton-line"></div>
                <div class="skeleton-line"></div>
            </div>
        </div>
        <!-- Loading Overlay (centered between panels) -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner-ring"></div>
            <div class="loading-text" id="loadingText">Refining...</div>
        </div>
        <!-- Error Overlay -->
        <div class="error-state" id="errorState" style="position:absolute;inset:0;background:rgba(11,15,25,0.92);border-radius:16px;z-index:11;">
            <span style="font-size:2rem;">&#x26A0;</span>
            <span style="color:var(--text2);font-size:0.95rem;">Try again</span>
            <button class="retry-btn" onclick="retrySubmit()">&#x21BB; Retry</button>
        </div>
    </div>
</div>

<script>
/* ===== TYPEWRITER ===== */
const phrases = [
    "Ready to convert?",
    "Ready to fix the tone?",
    "Time to make it better.",
    "Make it professional instantly.",
    "Bring your text to life."
];
let phraseIdx = 0, charIdx = 0, isDeleting = false;
const typeEl = document.getElementById('typewriterText');

function typewrite() {
    const current = phrases[phraseIdx];
    if (!isDeleting) {
        typeEl.textContent = current.substring(0, charIdx + 1);
        charIdx++;
        if (charIdx === current.length) {
            setTimeout(() => { isDeleting = true; typewrite(); }, 2000);
            return;
        }
        setTimeout(typewrite, 60);
    } else {
        typeEl.textContent = current.substring(0, charIdx - 1);
        charIdx--;
        if (charIdx === 0) {
            isDeleting = false;
            phraseIdx = (phraseIdx + 1) % phrases.length;
            setTimeout(typewrite, 400);
            return;
        }
        setTimeout(typewrite, 35);
    }
}
typewrite();

/* ===== AUTO GROW TEXTAREA ===== */
function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 350) + 'px';
}

/* ===== WORD COUNT ===== */
function updateWords() {
    const t = document.getElementById('inputText').value.trim();
    const w = t === '' ? 0 : t.split(/\s+/).length;
    document.getElementById('wordBadge').textContent = w + ' words';
}

/* ===== MODE SELECTION ===== */
let selectedMode = 'HUMANIZER';
function selectMode(btn) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    selectedMode = btn.dataset.mode;
    const tag = document.getElementById('modeTag');
    document.getElementById('modeTagLabel').textContent = btn.textContent.trim();
    tag.classList.add('visible');
}
function clearMode() {
    selectedMode = 'HUMANIZER';
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    document.querySelector('.pill[data-mode="HUMANIZER"]').classList.add('active');
    document.getElementById('modeTag').classList.remove('visible');
}

/* ===== LOADING WORDS ROTATION ===== */
const loadingWords = ["Refining...", "Polishing...", "Almost ready..."];
let loadInterval = null;
function startLoadingWords() {
    let i = 0;
    const el = document.getElementById('loadingText');
    el.textContent = loadingWords[0];
    loadInterval = setInterval(() => {
        i = (i + 1) % loadingWords.length;
        el.textContent = loadingWords[i];
    }, 2500);
}
function stopLoadingWords() {
    clearInterval(loadInterval);
}

/* ===== DIFF LOGIC ===== */
let diffVisible = true;
let lastInputText = '', lastOutputText = '';

function toggleDiff() {
    diffVisible = !diffVisible;
    const btn = document.getElementById('diffToggle');
    btn.classList.toggle('active', diffVisible);
    renderDiff();
}

function simpleDiff(a, b) {
    const wa = a.split(/(\s+)/), wb = b.split(/(\s+)/);
    let inHtml = '', outHtml = '';
    const max = Math.max(wa.length, wb.length);
    for (let i = 0; i < max; i++) {
        const aw = wa[i] || '', bw = wb[i] || '';
        if (aw === bw) {
            inHtml += aw; outHtml += bw;
        } else {
            if (aw) inHtml += '<span class="diff-del">' + escHtml(aw) + '</span>';
            if (bw) outHtml += '<span class="diff-add">' + escHtml(bw) + '</span>';
        }
    }
    return { inHtml, outHtml };
}
function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderDiff() {
    const ib = document.getElementById('inputBody');
    const ob = document.getElementById('outputBody');
    if (diffVisible && lastInputText && lastOutputText) {
        const d = simpleDiff(lastInputText, lastOutputText);
        ib.innerHTML = d.inHtml;
        ob.innerHTML = d.outHtml;
    } else {
        ib.textContent = lastInputText;
        ob.textContent = lastOutputText;
    }
}

/* ===== SUBMIT ===== */
let lastPayload = null;

async function submitText() {
    const inputEl = document.getElementById('inputText');
    const text = inputEl.value.trim();
    if (!text) return;

    lastPayload = { text, mode: selectedMode };
    lastInputText = text;
    lastOutputText = '';

    // Disable input & button
    inputEl.disabled = true;
    document.getElementById('submitBtn').disabled = true;

    // Show results with skeleton
    const results = document.getElementById('results');
    const errorState = document.getElementById('errorState');
    const overlay = document.getElementById('loadingOverlay');
    const evalTag = document.getElementById('evalTag');
    errorState.classList.remove('show');
    results.classList.add('show');

    // Skeleton in output
    document.getElementById('outputBody').innerHTML =
        '<div class="skeleton-line" style="width:100%"></div>' +
        '<div class="skeleton-line"></div><div class="skeleton-line"></div>' +
        '<div class="skeleton-line"></div><div class="skeleton-line"></div>';

    // Input panel shows original text
    document.getElementById('inputBody').textContent = text;
    evalTag.style.display = 'none';

    // Show loading overlay
    overlay.classList.add('show');
    startLoadingWords();

    try {
        const res = await fetch('/humanize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(lastPayload)
        });
        const data = await res.json();

        stopLoadingWords();
        overlay.classList.remove('show');

        if (data.ai_evaluation === 'INVALID_INPUT' || !data.output) {
            errorState.classList.add('show');
            return;
        }

        // Evaluation tag
        evalTag.style.display = 'inline-flex';
        if (data.ai_evaluation === 'HUMAN_LIKE') {
            evalTag.className = 'eval-tag human';
            evalTag.textContent = 'HUMAN_LIKE';
        } else {
            evalTag.className = 'eval-tag ai';
            evalTag.textContent = 'AI_GENERATED';
        }

        lastOutputText = data.output;
        diffVisible = true;
        document.getElementById('diffToggle').classList.add('active');
        renderDiff();

        // Clear input
        inputEl.value = '';
        autoGrow(inputEl);
        updateWords();

    } catch(e) {
        stopLoadingWords();
        overlay.classList.remove('show');
        errorState.classList.add('show');
    } finally {
        inputEl.disabled = false;
        document.getElementById('submitBtn').disabled = false;
    }
}

function retrySubmit() {
    document.getElementById('errorState').classList.remove('show');
    if (lastPayload) {
        document.getElementById('inputText').value = lastPayload.text;
        autoGrow(document.getElementById('inputText'));
        updateWords();
        submitText();
    }
}

/* ===== COPY ===== */
function copyText(elId) {
    const el = document.getElementById(elId);
    const text = el.textContent || el.innerText;
    navigator.clipboard.writeText(text);
}

/* ===== INIT ===== */
document.getElementById('diffToggle').classList.add('active');
document.getElementById('errorState').classList.remove('show');
</script>
</body>
</html>
